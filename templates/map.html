<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Search – TuHame</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { height: 100%; overflow: hidden; }

    .map-page-wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .map-layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .map-sidebar {
      background: var(--white);
      border-right: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }

    [data-theme="dark"] .map-sidebar {
      background: #242526;
      border-color: #3A3B3C;
    }

    .map-sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
    }

    [data-theme="dark"] .map-sidebar-header {
      border-color: #3A3B3C;
    }

    .map-search-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--gray-100);
      border-radius: var(--radius);
      padding: 0.6rem 0.875rem;
      margin-bottom: 0.75rem;
    }

    [data-theme="dark"] .map-search-bar {
      background: #2D2E30;
    }

    .map-search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 0.875rem;
      color: var(--gray-800);
    }

    [data-theme="dark"] .map-search-bar input { color: #E4E6EB; }
    [data-theme="dark"] .map-search-bar input::placeholder { color: #6B6C6E; }

    .map-filters {
      display: flex;
      gap: 0.4rem;
      overflow-x: auto;
      padding-bottom: 0.25rem;
      scrollbar-width: none;
    }
    .map-filters::-webkit-scrollbar { display: none; }

    .map-filter-chip {
      flex-shrink: 0;
      padding: 0.3rem 0.8rem;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-full);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--gray-600);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      background: var(--white);
    }

    [data-theme="dark"] .map-filter-chip {
      background: #2D2E30;
      border-color: #3A3B3C;
      color: #9A9B9D;
    }

    .map-filter-chip.active {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(37,99,235,0.08);
    }

    .map-range-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--gray-500);
      margin-bottom: 0.3rem;
      margin-top: 0.6rem;
    }

    .map-range-val { color: var(--primary); font-weight: 700; }

    .map-results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.75rem;
    }

    .map-listings {
      flex: 1;
      overflow-y: auto;
      padding: 0.875rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .map-listing-card {
      display: flex;
      gap: 0.875rem;
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    [data-theme="dark"] .map-listing-card {
      background: #2D2E30;
      border-color: #3A3B3C;
    }

    .map-listing-card:hover,
    .map-listing-card.active {
      border-color: var(--primary);
      box-shadow: 0 4px 16px rgba(37,99,235,0.15);
    }

    .map-listing-img {
      width: 86px;
      height: 70px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      flex-shrink: 0;
    }

    .map-listing-info { flex: 1; min-width: 0; }

    .map-listing-name {
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--gray-900);
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    [data-theme="dark"] .map-listing-name { color: #E4E6EB; }

    .map-listing-loc {
      font-size: 0.75rem;
      color: var(--gray-400);
      margin-bottom: 0.35rem;
    }

    .map-listing-price {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--primary);
    }

    /* Leaflet map */
    #leaflet-map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Custom Leaflet marker */
    .tuhame-pin {
      background: var(--primary, #2563EB);
      color: #fff;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 3px 12px rgba(37,99,235,0.45);
      font-family: 'Plus Jakarta Sans', sans-serif;
      position: relative;
      border: 2px solid #fff;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .tuhame-pin:hover { transform: scale(1.08); }
    .tuhame-pin.pin-villa { background: #7C3AED; }
    .tuhame-pin.pin-bnb { background: #0891B2; }
    .tuhame-pin.pin-commercial { background: #374151; }
    .tuhame-pin.pin-active { background: #0F172A; transform: scale(1.1); }

    /* Leaflet popup override */
    .leaflet-popup-content-wrapper {
      border-radius: 14px !important;
      padding: 0 !important;
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(0,0,0,0.18) !important;
      border: none !important;
    }
    .leaflet-popup-content {
      margin: 0 !important;
      width: 220px !important;
    }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button {
      top: 6px !important; right: 8px !important;
      color: #fff !important; font-size: 18px !important;
      z-index: 10;
    }

    .popup-img { width: 100%; height: 110px; object-fit: cover; display: block; }
    .popup-body { padding: 0.875rem; }
    .popup-name { font-weight: 700; font-size: 0.875rem; color: #111; margin-bottom: 0.2rem; }
    .popup-loc { font-size: 0.72rem; color: #9CA3AF; margin-bottom: 0.4rem; }
    .popup-price { font-weight: 800; font-size: 1rem; color: #2563EB; margin-bottom: 0.7rem; }
    .popup-meta { display: flex; gap: 0.6rem; font-size: 0.72rem; color: #6B7280; margin-bottom: 0.75rem; }
    .popup-btn {
      display: block; width: 100%; text-align: center;
      background: #2563EB; color: #fff;
      border-radius: 8px; padding: 0.6rem;
      font-size: 0.82rem; font-weight: 700;
      text-decoration: none;
    }
    .popup-btn:hover { background: #1D4ED8; }

    /* Map controls */
    .leaflet-control-zoom {
      border: none !important;
      box-shadow: var(--shadow-md) !important;
    }
    .leaflet-control-zoom a {
      border-radius: 8px !important;
      border: 1px solid var(--gray-200) !important;
      color: var(--gray-700) !important;
      font-weight: 700;
      width: 36px !important; height: 36px !important;
      line-height: 36px !important;
    }
    .leaflet-control-zoom a:hover {
      background: var(--primary) !important;
      color: #fff !important;
    }

    /* Location btn */
    .locate-btn {
      position: absolute;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 800;
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; cursor: pointer;
      box-shadow: var(--shadow-md);
      transition: all 0.2s;
    }
    .locate-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Dark tile filter */
    [data-theme="dark"] .leaflet-tile-pane {
      filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7);
    }

    /* Info banner */
    .map-info-banner {
      position: absolute;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 800;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 0.5rem 1.25rem;
      box-shadow: var(--shadow-md);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--gray-700);
      white-space: nowrap;
      pointer-events: none;
    }

    [data-theme="dark"] .map-info-banner {
      background: rgba(36,37,38,0.95);
      color: #CED0D4;
    }

    @media (max-width: 768px) {
      html, body { overflow: auto; }
      .map-page-wrap { height: auto; }
      .map-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 55vh;
        flex: none;
        height: auto;
      }
      .map-sidebar {
        max-height: 55vh;
        border-right: none;
        border-bottom: 1px solid var(--gray-200);
        overflow: hidden;
      }
    }
  </style>
</head>
<body>

<div class="map-page-wrap">

<!-- NAVBAR — always solid on map page -->
<nav class="navbar solid" id="map-navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">🏠</div>TuHame
    </a>
    <ul class="nav-menu">
      <li><a href="index.html" class="nav-link">Home</a></li>
      <li><a href="properties.html" class="nav-link">Properties</a></li>
      <li><a href="map.html" class="nav-link active">Map Search</a></li>

    <button class="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="mobile-menu">
  <a href="index.html">🏠 Home</a>
  <a href="properties.html">🏘 Properties</a>
  <a href="map.html">🗺 Map Search</a>
  <div class="mobile-actions">
    <a href="login.html" class="btn btn-outline-dark btn-sm">Login</a>
    <a href="register.html" class="btn btn-primary btn-sm">Register</a>
  </div>
</div>

<!-- MAP LAYOUT -->
<div class="map-layout">

  <!-- Sidebar -->
  <div class="map-sidebar">
    <div class="map-sidebar-header">
      <div class="map-search-bar">
        <span style="color:var(--gray-400);font-size:0.9rem;">🔍</span>
        <input type="text" placeholder="Search Nairobi, Mombasa, Kisumu…" id="map-search-input" />
        <button onclick="searchLocation()" style="background:var(--primary);color:#fff;border:none;border-radius:8px;padding:0.3rem 0.7rem;font-size:0.78rem;cursor:pointer;font-weight:600;">Go</button>
      </div>

      <div class="map-filters">
        <div class="map-filter-chip active" onclick="filterChip(this,'all')">All</div>
        <div class="map-filter-chip" onclick="filterChip(this,'apartment')">🏠 Apartment</div>
        <div class="map-filter-chip" onclick="filterChip(this,'villa')">🏘 Villa</div>
        <div class="map-filter-chip" onclick="filterChip(this,'bnb')">🛏 BnB</div>
        <div class="map-filter-chip" onclick="filterChip(this,'rental')">🏡 Rental</div>
        <div class="map-filter-chip" onclick="filterChip(this,'commercial')">🏢 Commercial</div>
      </div>

      <div>
        <div class="map-range-row">
          <span>Price Range</span>
          <span class="map-range-val" id="map-price-val">Up to KES 200k</span>
        </div>
        <input type="range" min="5000" max="500000" value="200000" step="5000" style="width:100%;accent-color:var(--primary);"
          oninput="document.getElementById('map-price-val').textContent='Up to KES '+Math.round(this.value/1000)+'k'" />
      </div>

      <div class="map-results-bar">
        <span style="font-size:0.8rem;color:var(--gray-400);" id="results-count">Showing 6 properties</span>
        <div style="display:flex;gap:0.4rem;align-items:center;">
          <select style="padding:0.3rem 0.6rem;border:1.5px solid var(--gray-200);border-radius:8px;font-size:0.78rem;color:var(--gray-700);outline:none;background:var(--white);" id="sort-select" onchange="sortListings()">
            <option value="nearest">Nearest</option>
            <option value="price-low">Price ↑</option>
            <option value="price-high">Price ↓</option>
            <option value="rating">Rating</option>
          </select>
          <button onclick="locateMe()" style="background:var(--primary);color:#fff;border:none;border-radius:8px;padding:0.35rem 0.65rem;font-size:0.78rem;cursor:pointer;font-weight:600;">📍 Me</button>
        </div>
      </div>
    </div>

    <div class="map-listings" id="map-listings">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Map -->
  <div style="position:relative;flex:1;min-height:0;">
    <div id="leaflet-map"></div>
    <div class="map-info-banner" id="map-info-banner">📍 Nairobi, Kenya — 6 properties found</div>
    <button class="locate-btn" onclick="locateMe()" title="Find my location">📍</button>
  </div>

</div><!-- /map-layout -->
</div><!-- /map-page-wrap -->

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="assets/js/main.js"></script>
<script>
// ── Property Data ──
const properties = [
  {
    id: 1, name: 'Kilimani Heights Apt', type: 'apartment',
    location: 'Kilimani, Nairobi', lat: -1.2903, lng: 36.7817,
    price: 85000, beds: 3, baths: 2, rating: 4.8, dist: '0.3 km',
    img: 'https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=400&auto=format&fit=crop&q=80',
    badge: 'Featured', badgeColor: '#2563EB'
  },
  {
    id: 2, name: 'Karen Garden Villa', type: 'villa',
    location: 'Karen, Nairobi', lat: -1.3217, lng: 36.7100,
    price: 180000, beds: 4, baths: 3, rating: 4.9, dist: '3.1 km',
    img: 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=400&auto=format&fit=crop&q=80',
    badge: 'New', badgeColor: '#22C55E'
  },
  {
    id: 3, name: 'Westlands Studio Loft', type: 'bnb',
    location: 'Westlands, Nairobi', lat: -1.2667, lng: 36.8000,
    price: 35000, beds: 1, baths: 1, rating: 4.6, dist: '1.8 km',
    img: 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=400&auto=format&fit=crop&q=80',
    badge: 'BnB', badgeColor: '#0891B2'
  },
  {
    id: 4, name: 'Lavington Penthouse', type: 'apartment',
    location: 'Lavington, Nairobi', lat: -1.2837, lng: 36.7720,
    price: 120000, beds: 3, baths: 2, rating: 4.7, dist: '2.4 km',
    img: 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=400&auto=format&fit=crop&q=80',
    badge: 'Featured', badgeColor: '#2563EB'
  },
  {
    id: 5, name: 'Runda Estate Home', type: 'villa',
    location: 'Runda, Nairobi', lat: -1.2250, lng: 36.8050,
    price: 350000, beds: 5, baths: 4, rating: 5.0, dist: '8.2 km',
    img: 'https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=400&auto=format&fit=crop&q=80',
    badge: 'Gated', badgeColor: '#7C3AED'
  },
  {
    id: 6, name: 'Upperhill Serviced Apt', type: 'apartment',
    location: 'Upperhill, Nairobi', lat: -1.2980, lng: 36.8100,
    price: 75000, beds: 2, baths: 2, rating: 4.7, dist: '2.0 km',
    img: 'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=400&auto=format&fit=crop&q=80',
    badge: null, badgeColor: '#2563EB'
  }
];

// ── Init Leaflet ──
const map = L.map('leaflet-map', {
  center: [-1.2921, 36.8219],
  zoom: 13,
  zoomControl: false
});

// Tile layer
const lightTile = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
  maxZoom: 19
});

const darkTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> © <a href="https://carto.com">CARTO</a>',
  maxZoom: 19
});

// Pick tile based on current theme
function getCurrentTheme() {
  return document.documentElement.getAttribute('data-theme') === 'dark';
}

let activeTile = getCurrentTheme() ? darkTile : lightTile;
activeTile.addTo(map);

// Re-add tile when theme changes (MutationObserver)
const themeObserver = new MutationObserver(() => {
  const isDark = getCurrentTheme();
  if (isDark && activeTile !== darkTile) {
    map.removeLayer(activeTile);
    darkTile.addTo(map);
    activeTile = darkTile;
  } else if (!isDark && activeTile !== lightTile) {
    map.removeLayer(activeTile);
    lightTile.addTo(map);
    activeTile = lightTile;
  }
});
themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

// Zoom control
L.control.zoom({ position: 'topright' }).addTo(map);

// ── Markers ──
const markers = {};
const markerIcons = {};

function pinClass(type) {
  if (type === 'villa') return 'pin-villa';
  if (type === 'bnb') return 'pin-bnb';
  if (type === 'commercial') return 'pin-commercial';
  return '';
}

function createMarkerIcon(p, active = false) {
  const cls = `tuhame-pin ${pinClass(p.type)} ${active ? 'pin-active' : ''}`;
  const label = `${p.type === 'villa' ? '🏘' : p.type === 'bnb' ? '🛏' : p.type === 'commercial' ? '🏢' : '🏠'} KES ${Math.round(p.price/1000)}k`;
  return L.divIcon({
    className: '',
    html: `<div class="${cls}">${label}</div>`,
    iconAnchor: [50, 32],
    popupAnchor: [0, -36]
  });
}

function popupHTML(p) {
  return `
    <img class="popup-img" src="${p.img}" alt="${p.name}" />
    <div class="popup-body">
      <div class="popup-name">${p.name}</div>
      <div class="popup-loc">📍 ${p.location} · ${p.dist}</div>
      <div class="popup-price">KES ${p.price.toLocaleString()}<span style="font-size:0.75rem;font-weight:500;color:#9CA3AF;">/mo</span></div>
      <div class="popup-meta">
        <span>🛏 ${p.beds} bed</span>
        <span>🚿 ${p.baths} bath</span>
        <span>⭐ ${p.rating}</span>
      </div>
      <a href="property_detail.html" class="popup-btn">View Details →</a>
    </div>
  `;
}

let activeMarkerId = null;

properties.forEach(p => {
  const icon = createMarkerIcon(p);
  const marker = L.marker([p.lat, p.lng], { icon }).addTo(map);
  marker.bindPopup(popupHTML(p), { maxWidth: 240, minWidth: 220 });

  marker.on('click', () => {
    selectProperty(p.id, false);
  });

  markers[p.id] = marker;
});

function selectProperty(id, panMap = true) {
  // Reset previous active
  if (activeMarkerId && markers[activeMarkerId]) {
    const prev = properties.find(p => p.id === activeMarkerId);
    markers[activeMarkerId].setIcon(createMarkerIcon(prev, false));
  }

  const p = properties.find(pr => pr.id === id);
  if (!p) return;

  activeMarkerId = id;
  markers[id].setIcon(createMarkerIcon(p, true));
  markers[id].openPopup();

  if (panMap) {
    map.setView([p.lat, p.lng], 15, { animate: true });
  }

  // Highlight sidebar card
  document.querySelectorAll('.map-listing-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.map-listing-card[data-id="${id}"]`);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  document.getElementById('map-info-banner').textContent = `📍 ${p.name} — KES ${p.price.toLocaleString()}/mo`;
}

// ── Render Sidebar Listings ──
let currentFilter = 'all';

function renderListings(list) {
  const container = document.getElementById('map-listings');
  container.innerHTML = list.map(p => `
    <div class="map-listing-card" data-id="${p.id}" onclick="selectProperty(${p.id})">
      <img class="map-listing-img" src="${p.img}" alt="${p.name}" />
      <div class="map-listing-info">
        <div class="map-listing-name">${p.name}</div>
        <div class="map-listing-loc">📍 ${p.location} · ${p.dist}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:0.4rem;">
          <div class="map-listing-price">KES ${Math.round(p.price/1000)}k</div>
          <span style="font-size:0.72rem;color:#F59E0B;font-weight:600;">⭐ ${p.rating}</span>
        </div>
        <div style="font-size:0.72rem;color:var(--gray-400);margin-top:0.2rem;">🛏 ${p.beds} · 🚿 ${p.baths}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('results-count').textContent = `Showing ${list.length} properties`;
}

function getFilteredList() {
  return properties.filter(p => currentFilter === 'all' || p.type === currentFilter);
}

function filterChip(el, type) {
  document.querySelectorAll('.map-filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = type;
  const filtered = getFilteredList();
  renderListings(filtered);

  // Show/hide markers
  properties.forEach(p => {
    if (type === 'all' || p.type === type) {
      if (!map.hasLayer(markers[p.id])) markers[p.id].addTo(map);
    } else {
      if (map.hasLayer(markers[p.id])) map.removeLayer(markers[p.id]);
    }
  });
}

function sortListings() {
  const val = document.getElementById('sort-select').value;
  const list = [...getFilteredList()];
  if (val === 'price-low') list.sort((a,b) => a.price - b.price);
  else if (val === 'price-high') list.sort((a,b) => b.price - a.price);
  else if (val === 'rating') list.sort((a,b) => b.rating - a.rating);
  renderListings(list);
}

function searchLocation() {
  const q = document.getElementById('map-search-input').value.trim();
  if (!q) return;
  // Use Nominatim geocoder
  fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q + ', Kenya')}&format=json&limit=1`)
    .then(r => r.json())
    .then(data => {
      if (data && data[0]) {
        map.setView([parseFloat(data[0].lat), parseFloat(data[0].lon)], 14, { animate: true });
        showMapToast(`Moved to: ${data[0].display_name.split(',')[0]}`, '📍');
      } else {
        showMapToast('Location not found', '❌');
      }
    })
    .catch(() => showMapToast('Search failed — check connection', '⚠️'));
}

function locateMe() {
  if (!navigator.geolocation) { showMapToast('Geolocation not supported', '❌'); return; }
  showMapToast('Finding your location…', '📍');
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    map.setView([lat, lng], 15, { animate: true });
    L.circle([lat, lng], { radius: 80, color: '#2563EB', fillColor: '#2563EB', fillOpacity: 0.2 }).addTo(map);
    L.marker([lat, lng], {
      icon: L.divIcon({
        className: '',
        html: '<div style="width:16px;height:16px;background:#2563EB;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 4px rgba(37,99,235,0.3);"></div>',
        iconAnchor: [8, 8]
      })
    }).addTo(map).bindPopup('📍 You are here').openPopup();
    showMapToast('Location found!', '✅');
  }, () => showMapToast('Could not get location', '❌'));
}

document.getElementById('map-search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchLocation();
});

// ── Toast ──
function showMapToast(msg, icon) {
  let c = document.querySelector('.toast-container');
  if (!c) { c = document.createElement('div'); c.className = 'toast-container'; document.body.appendChild(c); }
  const t = document.createElement('div'); t.className = 'toast';
  t.innerHTML = `<span class="toast-icon">${icon}</span><span>${msg}</span>`;
  c.appendChild(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 2800);
}

// Init
renderListings(properties);
setTimeout(() => selectProperty(1), 600);
</script>
