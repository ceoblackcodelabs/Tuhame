{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Map Search – TuHame</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" />
<link rel="stylesheet" href="{% static "assets/css/map.css" %}" />
</head>
<body>

<div class="map-page-wrap">
  <div class="map-layout">

    <!-- Sidebar -->
    <aside class="map-sidebar" id="map-sidebar">
      <div class="map-sidebar-scroll">
        <div class="map-sidebar-header">
          <div class="sidebar-brand">
            <div class="sidebar-brand-icon">🏠</div>TuHame
          </div>

          <div class="map-search-bar">
            <span style="color:var(--gray-400);font-size:0.9rem;">🔍</span>
            <input type="text" placeholder="Search Nairobi, Mombasa, Kisumu…" id="map-search-input" />
            <button onclick="searchLocation()">Go</button>
          </div>

          <div class="map-filters">
            <div class="map-filter-chip active" onclick="filterChip(this,'all')">All</div>
            <div class="map-filter-chip" onclick="filterChip(this,'apartment')">🏠 Apartment</div>
            <div class="map-filter-chip" onclick="filterChip(this,'villa')">🏘 Villa</div>
            <div class="map-filter-chip" onclick="filterChip(this,'bnb')">🛏 BnB</div>
            <div class="map-filter-chip" onclick="filterChip(this,'rental')">🏡 Rental</div>
            <div class="map-filter-chip" onclick="filterChip(this,'commercial')">🏢 Commercial</div>
          </div>

          <div>
            <div class="map-range-row">
              <span>Price Range</span>
              <span class="map-range-val" id="map-price-val">Up to KES 200k</span>
            </div>
            <input type="range" min="5000" max="500000" value="200000" step="5000"
              oninput="document.getElementById('map-price-val').textContent='Up to KES '+Math.round(this.value/1000)+'k'" />
          </div>

          <div class="map-results-bar">
            <span style="font-size:0.8rem;color:var(--gray-400);" id="results-count">Showing 6 properties</span>
            <div style="display:flex;gap:0.4rem;align-items:center;">
              <select id="sort-select" onchange="sortListings()">
                <option value="nearest">Nearest</option>
                <option value="price-low">Price ↑</option>
                <option value="price-high">Price ↓</option>
                <option value="rating">Rating</option>
              </select>
              <button class="locate-inline-btn" onclick="locateMe()">📍 Me</button>
            </div>
          </div>
        </div>

        <div class="map-listings" id="map-listings"><!-- Populated by JS --></div>
      </div>

      <div class="map-sidebar-footer">
        <a href="{% url "home:home" %}" target="_blank" rel="noopener">TuHame</a> &copy; 2026
      </div>
    </aside>

    <!-- Mobile overlay (closes sidebar when tapped) -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar(false)"></div>

    <!-- Map -->
    <div class="map-area">
      <button class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleSidebar()" title="Menu">
        <span></span><span></span><span></span>
      </button>
      <div id="leaflet-map"></div>
      <div class="map-info-banner" id="map-info-banner">📍 Nairobi, Kenya — 6 properties found</div>
      <button class="locate-btn" onclick="locateMe()" title="Find my location">📍</button>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
  // Fallback in case the primary CDN is blocked/unreachable
  if (typeof L === 'undefined') {
    document.write('<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>');
  }
</script>
<script>
// ── Sidebar toggle (mobile) ──
const sidebarEl = document.getElementById('map-sidebar');
const overlayEl = document.getElementById('sidebar-overlay');
const menuBtn = document.getElementById('mobile-menu-btn');

function toggleSidebar(force) {
  const open = typeof force === 'boolean' ? force : !sidebarEl.classList.contains('open');
  sidebarEl.classList.toggle('open', open);
  overlayEl.classList.toggle('show', open);
  menuBtn.classList.toggle('open', open);
}

// ── Property Data ──
const properties = [
  { id: 1, name: 'Kilimani Heights Apt', type: 'apartment', location: 'Kilimani, Nairobi', lat: -1.2903, lng: 36.7817, price: 85000, beds: 3, baths: 2, rating: 4.8, dist: '0.3 km', img: 'https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=400&auto=format&fit=crop&q=80' },
  { id: 2, name: 'Karen Garden Villa', type: 'villa', location: 'Karen, Nairobi', lat: -1.3217, lng: 36.7100, price: 180000, beds: 4, baths: 3, rating: 4.9, dist: '3.1 km', img: 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=400&auto=format&fit=crop&q=80' },
  { id: 3, name: 'Westlands Studio Loft', type: 'bnb', location: 'Westlands, Nairobi', lat: -1.2667, lng: 36.8000, price: 35000, beds: 1, baths: 1, rating: 4.6, dist: '1.8 km', img: 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=400&auto=format&fit=crop&q=80' },
  { id: 4, name: 'Lavington Penthouse', type: 'apartment', location: 'Lavington, Nairobi', lat: -1.2837, lng: 36.7720, price: 120000, beds: 3, baths: 2, rating: 4.7, dist: '2.4 km', img: 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=400&auto=format&fit=crop&q=80' },
  { id: 5, name: 'Runda Estate Home', type: 'villa', location: 'Runda, Nairobi', lat: -1.2250, lng: 36.8050, price: 350000, beds: 5, baths: 4, rating: 5.0, dist: '8.2 km', img: 'https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=400&auto=format&fit=crop&q=80' },
  { id: 6, name: 'Upperhill Serviced Apt', type: 'apartment', location: 'Upperhill, Nairobi', lat: -1.2980, lng: 36.8100, price: 75000, beds: 2, baths: 2, rating: 4.7, dist: '2.0 km', img: 'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=400&auto=format&fit=crop&q=80' }
];

// ── Init Leaflet ──
const map = L.map('leaflet-map', { center: [-1.2921, 36.8219], zoom: 13, zoomControl: false });

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
  maxZoom: 19
}).addTo(map);

L.control.zoom({ position: 'topright' }).addTo(map);

// ── Markers ──
const markers = {};

function pinClass(type) {
  if (type === 'villa') return 'pin-villa';
  if (type === 'bnb') return 'pin-bnb';
  if (type === 'commercial') return 'pin-commercial';
  return '';
}

function createMarkerIcon(p, active = false) {
  const cls = `tuhame-pin ${pinClass(p.type)} ${active ? 'pin-active' : ''}`;
  const label = `${p.type === 'villa' ? '🏘' : p.type === 'bnb' ? '🛏' : p.type === 'commercial' ? '🏢' : '🏠'} KES ${Math.round(p.price/1000)}k`;
  return L.divIcon({ className: '', html: `<div class="${cls}">${label}</div>`, iconAnchor: [50, 32], popupAnchor: [0, -36] });
}

function popupHTML(p) {
  return `
    <img class="popup-img" src="${p.img}" alt="${p.name}" />
    <div class="popup-body">
      <div class="popup-name">${p.name}</div>
      <div class="popup-loc">📍 ${p.location} · ${p.dist}</div>
      <div class="popup-price">KES ${p.price.toLocaleString()}<span style="font-size:0.75rem;font-weight:500;color:#9CA3AF;">/mo</span></div>
      <div class="popup-meta">
        <span>🛏 ${p.beds} bed</span>
        <span>🚿 ${p.baths} bath</span>
        <span>⭐ ${p.rating}</span>
      </div>
      <a href="property_detail.html" class="popup-btn">View Details →</a>
    </div>
  `;
}

let activeMarkerId = null;

properties.forEach(p => {
  const marker = L.marker([p.lat, p.lng], { icon: createMarkerIcon(p) }).addTo(map);
  marker.bindPopup(popupHTML(p), { maxWidth: 240, minWidth: 220 });
  marker.on('click', () => selectProperty(p.id, false));
  markers[p.id] = marker;
});

function selectProperty(id, panMap = true) {
  if (activeMarkerId && markers[activeMarkerId]) {
    const prev = properties.find(p => p.id === activeMarkerId);
    markers[activeMarkerId].setIcon(createMarkerIcon(prev, false));
  }
  const p = properties.find(pr => pr.id === id);
  if (!p) return;

  activeMarkerId = id;
  markers[id].setIcon(createMarkerIcon(p, true));
  markers[id].openPopup();
  if (panMap) map.setView([p.lat, p.lng], 15, { animate: true });

  document.querySelectorAll('.map-listing-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.map-listing-card[data-id="${id}"]`);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

  document.getElementById('map-info-banner').textContent = `📍 ${p.name} — KES ${p.price.toLocaleString()}/mo`;

  // Auto-close sidebar on mobile after selecting
  if (window.innerWidth <= 768) toggleSidebar(false);
}

// ── Render Sidebar Listings ──
let currentFilter = 'all';

function renderListings(list) {
  const container = document.getElementById('map-listings');
  container.innerHTML = list.map(p => `
    <div class="map-listing-card" data-id="${p.id}" onclick="selectProperty(${p.id})">
      <img class="map-listing-img" src="${p.img}" alt="${p.name}" />
      <div class="map-listing-info">
        <div class="map-listing-name">${p.name}</div>
        <div class="map-listing-loc">📍 ${p.location} · ${p.dist}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:0.4rem;">
          <div class="map-listing-price">KES ${Math.round(p.price/1000)}k</div>
          <span style="font-size:0.72rem;color:#F59E0B;font-weight:600;">⭐ ${p.rating}</span>
        </div>
        <div style="font-size:0.72rem;color:var(--gray-400);margin-top:0.2rem;">🛏 ${p.beds} · 🚿 ${p.baths}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('results-count').textContent = `Showing ${list.length} properties`;
}

function getFilteredList() {
  return properties.filter(p => currentFilter === 'all' || p.type === currentFilter);
}

function filterChip(el, type) {
  document.querySelectorAll('.map-filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = type;
  renderListings(getFilteredList());

  properties.forEach(p => {
    if (type === 'all' || p.type === type) { if (!map.hasLayer(markers[p.id])) markers[p.id].addTo(map); }
    else { if (map.hasLayer(markers[p.id])) map.removeLayer(markers[p.id]); }
  });
}

function sortListings() {
  const val = document.getElementById('sort-select').value;
  const list = [...getFilteredList()];
  if (val === 'price-low') list.sort((a,b) => a.price - b.price);
  else if (val === 'price-high') list.sort((a,b) => b.price - a.price);
  else if (val === 'rating') list.sort((a,b) => b.rating - a.rating);
  renderListings(list);
}

function searchLocation() {
  const q = document.getElementById('map-search-input').value.trim();
  if (!q) return;
  fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q + ', Kenya')}&format=json&limit=1`)
    .then(r => r.json())
    .then(data => {
      if (data && data[0]) {
        map.setView([parseFloat(data[0].lat), parseFloat(data[0].lon)], 14, { animate: true });
        showMapToast(`Moved to: ${data[0].display_name.split(',')[0]}`, '📍');
      } else { showMapToast('Location not found', '❌'); }
    })
    .catch(() => showMapToast('Search failed — check connection', '⚠️'));
}

function locateMe() {
  if (!navigator.geolocation) { showMapToast('Geolocation not supported', '❌'); return; }
  showMapToast('Finding your location…', '📍');
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    map.setView([lat, lng], 15, { animate: true });
    L.circle([lat, lng], { radius: 80, color: '#2563EB', fillColor: '#2563EB', fillOpacity: 0.2 }).addTo(map);
    L.marker([lat, lng], {
      icon: L.divIcon({ className: '', html: '<div style="width:16px;height:16px;background:#2563EB;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 4px rgba(37,99,235,0.3);"></div>', iconAnchor: [8, 8] })
    }).addTo(map).bindPopup('📍 You are here').openPopup();
    showMapToast('Location found!', '✅');
  }, () => showMapToast('Could not get location', '❌'));
}

document.getElementById('map-search-input').addEventListener('keydown', e => { if (e.key === 'Enter') searchLocation(); });

// ── Toast ──
function showMapToast(msg, icon) {
  let c = document.querySelector('.toast-container');
  if (!c) { c = document.createElement('div'); c.className = 'toast-container'; document.body.appendChild(c); }
  const t = document.createElement('div'); t.className = 'toast';
  t.innerHTML = `<span class="toast-icon">${icon}</span><span>${msg}</span>`;
  c.appendChild(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 2800);
}

// Init
renderListings(properties);
setTimeout(() => selectProperty(1, false), 600);

// Fix Leaflet sizing on sidebar toggle / resize
window.addEventListener('resize', () => map.invalidateSize());
</script>
</body>
</html>
